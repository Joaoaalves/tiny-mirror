# NGINX reverse proxy for tiny-mirror (HTTP only).
#
# Install:
#   sudo cp deploy/nginx/tiny-mirror.conf \
#       /etc/nginx/sites-available/tiny-mirror.conf
#   sudo ln -sf /etc/nginx/sites-available/tiny-mirror.conf \
#       /etc/nginx/sites-enabled/tiny-mirror.conf
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Replace `tiny-mirror.internal` with the actual server_name you want
# to expose (internal hostname, IP or FQDN).

upstream tiny_mirror {
    server 127.0.0.1:8001;
    keepalive 16;
}

server {
    listen 80;
    server_name tiny-mirror.internal;

    client_max_body_size 10M;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 5s;

    # /health is hit by load balancers and uptime probes — silence the
    # access log so it doesn't drown the actual traffic.
    location = /health {
        proxy_pass http://tiny_mirror;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    location / {
        proxy_pass http://tiny_mirror;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
