# NGINX reverse proxy for tiny-mirror (HTTPS-first, with HTTP -> HTTPS redirect).
#
# Install:
#   sudo cp deploy/nginx/tiny-mirror.conf \
#       /etc/nginx/sites-available/tiny-mirror.conf
#   sudo ln -sf /etc/nginx/sites-available/tiny-mirror.conf \
#       /etc/nginx/sites-enabled/tiny-mirror.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS cert (Let's Encrypt):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d <your-public-fqdn>   # also opens 443 automatically
#   sudo certbot renew --dry-run                  # confirm auto-renew works
#
# Replace `tiny-mirror.internal` with the real public FQDN.
# IMPORTANT: until the cert is provisioned, certbot will fail. Either run
# certbot first (it'll edit this file in place for you), or temporarily
# comment out the 443 server block and the HTTP->HTTPS redirect on 80.

upstream tiny_mirror {
    server 127.0.0.1:8001;
    keepalive 16;
}

# Rate limit zone: 30 req/min per source IP for state-changing endpoints.
# Burst 10 absorbs legitimate bursts (e.g. /sync/orders/reconcile fanning
# out multiple days in quick succession). Excess returns 429.
limit_req_zone $binary_remote_addr zone=tinymirror_sync:10m rate=30r/m;

# ----------------------------------------------------------------------------
# Plain HTTP server: redirect everything to HTTPS, except ACME challenge.
# ----------------------------------------------------------------------------
server {
    listen 80;
    server_name tiny-mirror.internal;

    # Allow Let's Encrypt http-01 renewal without TLS.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------------------------
# HTTPS server (main).
# ----------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name tiny-mirror.internal;

    # Hide nginx version in Server: header and error pages.
    server_tokens off;

    # TLS (paths come from certbot --nginx).
    ssl_certificate     /etc/letsencrypt/live/tiny-mirror.internal/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tiny-mirror.internal/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (certbot writes the chain file).
    ssl_stapling on;
    ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/letsencrypt/live/tiny-mirror.internal/chain.pem;

    # Security headers. Mostly defensive — the API returns JSON only, so
    # X-Frame-Options / CSP / Referrer-Policy are belt-and-suspenders.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    # Default tight body limit; relax per location where needed.
    client_max_body_size 64k;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 5s;

    # /health is hit by load balancers and uptime probes — silence the
    # access log so it doesn't drown the actual traffic.
    location = /health {
        proxy_pass http://tiny_mirror;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # Mutating endpoints: rate-limited.
    # The 30 r/m budget is per source IP. Loopback / VPS-internal scripts
    # bypass the X-API-Key check upstream (see settings.api_key_ip_allowlist).
    location /sync/ {
        limit_req zone=tinymirror_sync burst=10 nodelay;
        client_max_body_size 256k;
        proxy_pass http://tiny_mirror;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /fulfillment/ {
        limit_req zone=tinymirror_sync burst=10 nodelay;
        client_max_body_size 64k;
        proxy_pass http://tiny_mirror;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # /ml-promotions/* tem endpoints lentos por design: refresh-all bate
    # GAS/Tiny por SKU, generate enumera ~370 MLBs e calcula cap per
    # listing (~3 min). O default 60s mata em 504 e o trabalho server-side
    # continua até completar — só o cliente fica sem resposta. Bumpamos
    # pra 600s pra cobrir o pior caso (+folga) sem mudar o engine.
    location /ml-promotions/ {
        limit_req zone=tinymirror_sync burst=10 nodelay;
        client_max_body_size 256k;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_pass http://tiny_mirror;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Webhook receivers: payloads from Tiny are small (<2 KB). Keep the
    # rate limit too — a misconfigured upstream could flood otherwise.
    location /webhooks/ {
        limit_req zone=tinymirror_sync burst=20 nodelay;
        client_max_body_size 32k;
        proxy_pass http://tiny_mirror;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://tiny_mirror;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
