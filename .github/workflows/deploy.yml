name: Deploy

# Placeholder workflow — the real deploy pipeline is wired up in stage 14.
# Until then this workflow only runs the lint + test gates so PRs are
# blocked when ruff, mypy or pytest fails.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Mypy
        run: poetry run mypy src/tiny_mirror

      - name: Pytest
        run: poetry run pytest -m "not e2e" --cov=src/tiny_mirror
