name: "Deploy tiny-mirror"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint & type-check
  # ---------------------------------------------------------------------------
  lint:
    name: "Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Install project
        run: poetry install --no-interaction

      - name: Ruff lint
        run: poetry run ruff check src/ tests/

      - name: Ruff format check
        run: poetry run ruff format --check src/ tests/

      - name: Mypy
        run: poetry run mypy src/tiny_mirror

  # ---------------------------------------------------------------------------
  # Job 2: Run unit tests + coverage
  # ---------------------------------------------------------------------------
  # The unit suite is mock-only and runs in <2s. We deliberately do NOT spin
  # up Postgres / Redis / RabbitMQ services here: tests/integration is
  # collapsed into tests/e2e (which requires live Tiny credentials and only
  # runs locally — see memory/project_test_strategy.md).
  test:
    name: "Run Tests"
    runs-on: ubuntu-latest
    needs: lint
    env:
      # Settings() needs every required env var to instantiate at import
      # time. Unit tests are fully mocked and don't actually connect.
      DATABASE_URL: postgresql+asyncpg://stub:stub@localhost:5432/stub
      REDIS_URL: redis://localhost:6379/0
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      APP_ENV: development
      LOG_LEVEL: WARNING
      TINY_CLIENT_ID: ci_test_client_id
      TINY_CLIENT_SECRET: ci_test_client_secret
      TINY_ACCESS_TOKEN: ci_test_access
      TINY_REFRESH_TOKEN: ci_test_refresh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Install project
        run: poetry install --no-interaction

      - name: Run unit tests with coverage
        # The 80% gate from pyproject.toml is enforced by the full local
        # suite (unit + e2e). CI cannot run e2e (needs live Tiny creds),
        # so we relax to 35% here — guards against drastic unit regressions
        # without blocking on paths that only e2e exercises.
        run: |
          poetry run pytest tests/unit -m unit \
            --cov=src/tiny_mirror \
            --cov-report=term \
            --cov-report=xml \
            --cov-fail-under=35 \
            -v --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Job 3: Deploy to VPS via SSH + rsync
  # ---------------------------------------------------------------------------
  # Only fires on a successful push to main; PRs run lint/test only.
  deploy:
    name: "Deploy to VPS"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.VPS_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat >> ~/.ssh/config << EOF
          Host vps
            HostName ${{ secrets.VPS_HOST }}
            Port ${{ secrets.VPS_PORT }}
            User ${{ secrets.VPS_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
          EOF
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null

      - name: Sync code to VPS
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '*.pyo' \
            --exclude '.pytest_cache' \
            --exclude '.mypy_cache' \
            --exclude '.ruff_cache' \
            --exclude 'tests/' \
            --exclude '.env' \
            --exclude '.env.local' \
            --exclude '*.egg-info' \
            --exclude '.venv' \
            --exclude 'htmlcov/' \
            --exclude 'coverage.xml' \
            --exclude '.github/' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }}" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/tiny-mirror/current/

      - name: Install Python dependencies on VPS
        run: |
          ssh vps "cd /opt/tiny-mirror/current && \
            poetry install --only main --no-interaction"

      - name: Ensure .env symlink for pydantic-settings
        # Settings() looks for `.env` in the working directory; the real file
        # lives at /opt/tiny-mirror/.env (preserved across deploys via the
        # rsync --exclude above). The symlink is idempotent.
        run: |
          ssh vps "ln -sfn /opt/tiny-mirror/.env /opt/tiny-mirror/current/.env"

      - name: Apply database migrations
        # Migrations run BEFORE the service restart. If they fail, the
        # deploy aborts and the previous service keeps running.
        run: |
          ssh vps "cd /opt/tiny-mirror/current && \
            poetry run alembic upgrade head"

      - name: Restart tiny-mirror service
        run: |
          ssh vps "sudo systemctl restart tiny-mirror"

      - name: Verify service is running
        run: |
          sleep 5
          ssh vps "systemctl is-active --quiet tiny-mirror" || {
            echo '::error::Service failed to start; printing journal'
            ssh vps "journalctl -u tiny-mirror --no-pager -n 50"
            exit 1
          }

      - name: Health check
        # uvicorn binds to localhost only — nginx is the public ingress.
        # We curl /health from inside the VPS over SSH.
        run: |
          sleep 3
          ssh vps "curl --fail --silent --show-error http://127.0.0.1:8001/health" \
          | python3 -c "import sys, json; d=json.load(sys.stdin); print(d); exit(0 if d['status']=='ok' else 1)"

      - name: Cleanup SSH credentials
        if: always()
        run: rm -f ~/.ssh/deploy_key ~/.ssh/config
